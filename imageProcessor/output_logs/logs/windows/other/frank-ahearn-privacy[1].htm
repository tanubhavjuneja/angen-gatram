		<script type="text/javascript">

            function increment_playcount(id) {
                var url = 'http://cache.wbur.org/audio/increment/' + id;
                jQuery.get(url);
            }

			/* Player event tracking */

			var current_title = "";
            var set1sec = false;
            var set30sec = false;
			var set50per = false;
			var set95per = false;

			function wmp_event_tracker(event, title){

				var percent = event.jPlayer.status.currentPercentRelative;
				var duration = event.jPlayer.status.duration;
				var audioListenedSec = event.jPlayer.status.currentTime;
				var id = event.jPlayer.status.media.id;

				if(duration == 0 || audioListenedSec == 0) return;

                if(!set1sec && audioListenedSec >= 1) {
                    if(id) increment_playcount(id);
                    _gaq.push(["_trackEvent", "Audio Player", "1 second listened", title]);
                    set1sec = true;
                }
				if(!set30sec && audioListenedSec >= 30) {
					if(id) increment_playcount(id);
                    _gaq.push(["_trackEvent", "Audio Player", "30 seconds listened", title]);
					set30sec = true;
				}
				if(!set50per && percent >= 50) {
					_gaq.push(["_trackEvent", "Audio Player", "50pct Listened", title]);
					set50per = true;
				}
				if(!set95per && percent >= 95) {
					_gaq.push(["_trackEvent", "Audio Player", "95pct listened", title]);
					set95per = true;
				}
			}

            function wmp_chartbeat_push() {
                window['_cbv_strategies'] = window['_cbv_strategies'] || [];
                window['_cbv_strategies'].push(AudioStrategy);
                var _cbv = window._cbv || (window._cbv = []);
                var player = document.getElementsByTagName('audio')[0];
                _cbv.push(player);
            }

            // slimscroll
			var s = setTimeout(function(){
				jQuery('.jp-playlist').slimScroll({
					alwaysVisible: true,
					disableFadeOut: true,
					height: '148px',
					wheelStep: 8
				});
			},1000);

			// player
			jQuery(document).ready(function(){

				jQuery('.mp-embed-btn').click(function() {
					jQuery(this).toggleClass('mp-embed-btn-on');
					var m = jQuery('.mp-embed-pane');
					m.animate({
						marginTop: parseInt(m.css('marginTop')) == 56 ? 126 : m.outerHeight()
					}, 500);

					if( !Modernizr.touch ) {
						jQuery('#mp-embed-copy').select();
					}

					return false;
				});

				
				jQuery("#mp-player").jPlayer({
                    cssSelectorAncestor: "#mp",
                    ready: function (event) {
                        jQuery(this).jPlayer("setMedia", {"id":703131,"title":"Private Investigator Explains How To \u2018Vanish Without A Trace\u2019","duration":"15:52","playcount":30,"mp3":"http://audio.wbur.org/storage/2010/12/hereandnow_1203_frank-ahearn-privacy.mp3","oga":"http://audio.wbur.org/storage/2010/12/hereandnow_1203_frank-ahearn-privacy.ogg"});
                        
                        /* Set title and poster attribute in html5 audio element for Chartbeat tracking */
                        jQuery('#mp-player audio').attr('poster', 'http://cdn.wbur.org/images/chartbeat/hereandnow.jpg');
                        jQuery('#mp-player audio').attr('title', jQuery(".mp-title").html() );
                                            },
                    loadstart: function (event) {
						current_title = event.jPlayer.status.media.title;
                    	var playcount = event.jPlayer.status.media.playcount;
                    	if(playcount > 5) {
                    		jQuery('.mp-cnt-val').html(playcount);
                    		jQuery('.mp-cnt').fadeIn('fast');
                    	}

                        //chartbeat
                        wmp_chartbeat_push();
                    },
					timeupdate: function(event) {
						wmp_event_tracker(event, current_title);
					},
                    swfPath: "http://cdn.wbur.org/flash/Jplayer.swf",
                    supplied: "mp3,oga",
                    wmode: "window",
                    smoothPlayBar: true,
                    keyEnabled: false,
                    timeFormat: { 'padMin' : false, 'padHour' : false, 'showMin' : true },
					cssSelector: { seekBar: '.mp-seek-bar', playBar: '.mp-play-bar'},
                    solution: "html,flash"
                });

                			});

        </script>

			var _gaq = _gaq || [];
			_gaq.push(['_setAccount', 'UA-70853-10']);
			_gaq.push(['_setDomainName', 'wbur.org']);

			(function() {
			var ga = document.createElement('script'); ga.type = 'text/javascript'; ga.async = true;
				ga.src = ('https:' == document.location.protocol ? 'https://' : 'http://') + 'stats.g.doubleclick.net/dc.js';
				var s = document.getElementsByTagName('script')[0]; s.parentNode.insertBefore(ga, s);
			})();

			$(document).ready(function(){

		</script>

			var _sf_async_config={};
			_sf_async_config.uid = 40780;
			_sf_async_config.domain = "wbur.org";
			(function(){
				function loadChartbeat() {
					window._sf_endpt=(new Date()).getTime();
					var e = document.createElement("script");
					e.setAttribute("language", "javascript");
					e.setAttribute("type", "text/javascript");
					e.setAttribute('src', '//static.chartbeat.com/js/chartbeat_video.js');
					document.body.appendChild(e);
				}
				var oldonload = window.onload;
				window.onload = (typeof window.onload != "function") ?
					 loadChartbeat : function() { oldonload(); loadChartbeat(); };
			})();
